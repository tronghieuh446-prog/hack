static int (*orig_sysctl)(int*, u_int, void*, size_t*, void*, size_t);
static int hacked_sysctl(int *name, u_int namelen, void *oldp, size_t *oldlenp, void *newp, size_t newlen) {
  int ret = orig_sysctl ? orig_sysctl(name, namelen, oldp, oldlenp, newp, newlen) : -1;
  if(name[0] == CTL_KERN && name[1] == KERN_PROC && name[2] == KERN_PROC_PID && oldp) {
    struct kinfo_proc *kp = (struct kinfo_proc*)oldp;
    kp->kp_proc.p_flag &= ~0x800;
  }
  if(name[0] == CTL_KERN && name[1] == KERN_BOOTTIME && oldp) {
    // Fake boot time
    memset(oldp, 0, *oldlenp);
  }
  return ret;
}

