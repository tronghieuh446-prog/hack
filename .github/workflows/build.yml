    "anti-cheat.garena.com",
    "security.garena.com",
    "report.garena.com",
    "ban.garena.com",
    NULL
  };
  for(int i=0; blocked[i]; i++) {
    if(host && strstr(host, blocked[i])) {
      return orig_getaddrinfo ? orig_getaddrinfo("127.0.0.1", svc, hints, res) : -1;
