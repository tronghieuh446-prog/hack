static int (*orig_getaddrinfo)(const char*, const char*, const struct addrinfo*, struct addrinfo**);
static int hacked_getaddrinfo(const char *host, const char *svc, const struct addrinfo *hints, struct addrinfo **res) {
  static const char *blocked[] = {
    "anticheat.garena.com",
    "ff-anticheat.garena.com",
    "ssl-ff.garena.com",
    "config-ff.garena.com",
    "log-ff.garena.com",
