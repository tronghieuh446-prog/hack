static int (*orig_connect)(int, const struct sockaddr*, socklen_t);
static int hacked_connect(int fd, const struct sockaddr *addr, socklen_t len) {
  if(addr->sa_family == AF_INET) {
    struct sockaddr_in *sin = (struct sockaddr_in*)addr;
    char *ip = inet_ntoa(sin->sin_addr);
    static const char *blocked_ips[] = {
      "103.56.156.10", "45.64.156.20", "54.252.160.35",
      "13.228.0.", "18.136.", "52.77.", "54.169.",
      "54.179.", "54.254.", NULL
    };
    for(int i=0; blocked_ips[i]; i++) {
      if(strstr(ip, blocked_ips[i])) {
        errno = ECONNREFUSED;
        return -1;
      }
    }
    if(sin->sin_port == htons(17000) || sin->sin_port == htons(17500) || sin->sin_port == htons(20000)) {
      errno = ECONNREFUSED;
      return -1;
    }
  }
  return orig_connect ? orig_connect(fd, addr, len) : -1;
}

