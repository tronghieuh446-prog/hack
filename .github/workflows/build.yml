    "/Applications/Zebra.app",
    "/bin/bash",
    "/bin/sh",
    "/usr/sbin/sshd",
    "/usr/bin/ssh",
    "/etc/apt",
    "/etc/dpkg",
    "/Library/MobileSubstrate",
    "/Library/PreferenceBundles",
    "/var/lib/cydia",
    "/var/cache/apt",
    "/var/lib/dpkg",
    "/usr/lib/substrate",
    "/usr/lib/substitute",
    "/usr/lib/TweakInject",
