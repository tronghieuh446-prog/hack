static ssize_t (*orig_recv)(int, void*, size_t, int);
static ssize_t hacked_recv(int fd, void *buf, size_t len, int flags) {
  ssize_t ret = orig_recv ? orig_recv(fd, buf, len, flags) : -1;
  if(ret > 0) {
    // Modify response if needed (fake ban status = safe)
    char *data = (char*)buf;
    // Quick patch: replace "banned" with "safe__" in responses
    for(int i=0; i<ret-5; i++) {
      if(memcmp(data+i, "banned", 6) == 0) {
        memcpy(data+i, "safe__", 6);
      }
    }
  }
  return ret;
}

