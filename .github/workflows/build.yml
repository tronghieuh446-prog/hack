name: Build FFHack Framework
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Compile dylib
        run: |
          make
          ls -la FFHack.dylib
      - name: Create Framework
        run: |
          mkdir -p FFHack.framework
          cp FFHack.dylib FFHack.framework/FFHack
          cat > FFHack.framework/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>FFHack</string>
              <key>CFBundleIdentifier</key>
              <string>com.ffhack.mod</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>FFHack</string>
              <key>CFBundlePackageType</key>
              <string>FMWK</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF
          ls -la FFHack.framework/
      - name: Upload Framework
        uses: actions/upload-artifact@v4
        with:
          name: FFHack-Framework
          path: FFHack.framework
      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: FFHack-Dylib
          path: FFHack.dylib
