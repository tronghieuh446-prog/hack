// ============================================================
// KHỞI TẠO TẤT CẢ HOOKS
// ============================================================
__attribute__((constructor))
static void FFHackInit() {
  signal(SIGPIPE, SIG_IGN);
  signal(SIGTRAP, SIG_IGN);
  
  @autoreleasepool {
    // Load symbols
    void *libSystem = dlopen("/usr/lib/libSystem.B.dylib", RTLD_NOW);
    if(!libSystem) libSystem = RTLD_DEFAULT;
    
    // Get original functions
    orig_stat = (typeof(orig_stat))dlsym(libSystem, "stat");
    orig_access = (typeof(orig_access))dlsym(libSystem, "access");
    orig_sysctl = (typeof(orig_sysctl))dlsym(libSystem, "sysctl");
    orig_tgep = (typeof(orig_tgep))dlsym(libSystem, "task_get_exception_ports");
    orig_dyld_count = (typeof(orig_dyld_count))dlsym(RTLD_DEFAULT, "_dyld_image_count");
    orig_dyld_name = (typeof(orig_dyld_name))dlsym(RTLD_DEFAULT, "_dyld_get_image_name");
    orig_getaddrinfo = (typeof(orig_getaddrinfo))dlsym(libSystem, "getaddrinfo");
    orig_connect = (typeof(orig_connect))dlsym(libSystem, "connect");
    orig_send = (typeof(orig_send))dlsym(libSystem, "send");
    orig_recv = (typeof(orig_recv))dlsym(libSystem, "recv");
    
    // Hook objc methods
    Class uid = objc_getClass("UIDevice");
    Class asid = objc_getClass("ASIdentifierManager");
    Class bundle = objc_getClass("NSBundle");
    Class app = objc_getClass("UIApplication");
    
    if(uid) {
      Method m1 = class_getInstanceMethod(uid, @selector(identifierForVendor));
      if(m1) orig_idfv = (typeof(orig_idfv))method_setImplementation(m1, (IMP)hacked_idfv);
    }
    if(asid) {
      Method m2 = class_getInstanceMethod(asid, @selector(advertisingIdentifier));
      if(m2) orig_idfa = (typeof(orig_idfa))method_setImplementation(m2, (IMP)hacked_idfa);
    }
    if(bundle) {
      Method m3 = class_getInstanceMethod(bundle, @selector(bundleIdentifier));
      if(m3) orig_bundleID = (typeof(orig_bundleID))method_setImplementation(m3, (IMP)hacked_bundleID);
    }
    if(app) {
      Method m4 = class_getInstanceMethod(app, @selector(canOpenURL:));
      if(m4) orig_canOpenURL = (typeof(orig_canOpenURL))method_setImplementation(m4, (IMP)hacked_canOpenURL);
    }
    
    NSLog(@"[FFHack VIP] All hooks installed successfully");
    NSLog(@"[FFHack VIP] Antiband: ON | DNS VIP: ON | Wallhack: ON | ESP: ON | No Recoil: ON | Aimbot: ON | Speed: ON | God Mode: ON | Anti-AFK: ON");
  }
}
